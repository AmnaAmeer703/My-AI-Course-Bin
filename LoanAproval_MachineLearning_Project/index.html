<!DOCTYPE html>
<html>
<head>
    <title>Student Placement Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        .form-container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        .form-container input {
            width: 100%;
            padding: 10px;
            margin: 5px 0 20px 0;
            display: inline-block;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .form-container input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            border: none;
        }
        .form-container input[type="submit"]:hover {
            background-color: #45a049;
        }
        .result {
            font-size: 1.5em;
            color: #4CAF50;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Student Placement Prediction</h2>
        <form action="/predict" method="post">
            <label for="person_age">person_age:</label>
            <input type="number" name="person_age" required>

            <div class="form-group">
    <label for="person_gender">person_gender</label>
    <select id="person_gender" name="person_gender">
        <option value="male">male</option>
        <option value="female">female</option>
    </select>
          </div>

            <div class="form-group">
    <label for="person_education">person_education</label>
    <select id="person_education" name="person_education">
        <option value="Bachelor">Bachelor</option>
        <option value="Associate">Associate</option>
        <option value="High School">High School</option>
        <option value="Master">Master</option>
        <option value="Doctorate">Doctorate</option>
    </select>
          </div>

            <label for="person_income">person_income:</label>
            <input type="number" step="0.01" name="person_income" required>

            <label for="person_emp_exp">person_emp_exp:</label>
            <input type="number" name="person_emp_exp" required>

               <div class="form-group">
    <label for="person_home_ownership">person_home_ownership</label>
    <select id="person_home_ownership" name="person_home_ownership">
        <option value="RENT">RENT</option>
        <option value="MORTGAGE">MORTGAGE</option>
        <option value="OWN">OWN</option>
        <option value="OTHER">OTHER</option>
    </select>
          </div>

            <label for="loan_amnt">loan_amnt:</label>
            <input type="number" name="loan_amnt" required>

             <div class="form-group">
    <label for="loan_intent">loan_intent</label>
    <select id="loan_intent" name="loan_intent">
        <option value="EDUCATION">EDUCATION</option>
        <option value="MEDICAL">MEDICAL</option>
        <option value="VENTURE">VENTURE</option>
        <option value="PERSONAL">PERSONAL</option>
        <option value="DEBTCONSOLIDATION">DEBTCONSOLIDATION</option>
        <option value="HOMEIMPROVEMENT">HOMEIMPROVEMENT</option>
    </select>
          </div>

            <label for="loan_int_rates">loan_int_rate:</label>
            <input type="number" step="0.01" name="loan_int_rate" required>

            <label for="loan_percent_income">loan_percent_income</label>
            <input type="number" step="0.01" name="loan_percent_income" required>

            <label for="cb_person_cred_hist_length">cb_person_cred_hist_length</label>
            <input type="number" step="0.01" name="cb_person_cred_hist_length" required>

            <label for="credit_score">credit_score</label>
            <input type="credit_score" step="0.01" name="credit_score" required>


             <div class="form-group">
    <label for="previous_loan_defaults_on_file">previous_loan_defaults_on_file</label>
    <select id="previous_loan_defaults_on_file" name="previous_loan_defaults_on_file">
        <option value="Yes">Yes</option>
        <option value="No">No</option>
    </select>
          </div>

            <input type="submit" value="Predict">
        </form>
        {% if prediction_text %}
        <div class="result">{{ prediction_text }}</div>
        {% endif %}
    </div>
</body>
</html>
