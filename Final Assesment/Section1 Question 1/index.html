<!DOCTYPE html>
<html>
<head>
    <title>INSURRANCE PREDICTOR</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }
        form {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        div {
            margin-bottom: 15px;
        }
        label {
            margin-bottom: 5px;
            display: block;
            color: #666;
            font-weight: bold;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            margin: 4px 0;
            box-sizing: border-box;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        select {
            width: 100%;
            padding: 10px;
            margin: 4px 0;
            box-sizing: border-box;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 20px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div>
        <h2>Insurrance Predictor App</h2>
        <form action="/predict" method="POST">
            <div>
                <label for="age">age:</label>
                <input type="age" id="age" name="age" step="0.1" required>
            </div>
            <div>
                <label for="sex">sex:</label>
                <select id="sex" name="sex">
                    <option value="male">male</option>
                    <option value="female">female</option>
                </select>
            </div>
            <div>
                <label for="bmi">bmi:</label>
                <input type="number" id="bmi" name="bmi" step="0.1" required>
            </div>
            <div>
                <label for="chlidren">chlidren:</label>
                <input type="number" id="chlidren" name="chlidren" required>
            </div>
            <div>
                <label for="smoker">smoker:</label>
                <select id="smoker" name="smoker">
                    <option value="yes">yes</option>
                    <option value="no">no</option>
                </select>
            </div>
            <div>
                <label for="region">region:</label>
                <select id="region" name="region">
                    <option value="northeast">northeast</option>
                    <option value="northwest">northwest</option>
                    <option value="southeast">southeast</option>
                    <option value="southwest">southwest</option>
                </select>
            </div>
            <button type="submit">predict</button>
        </form>
    </div>
</body>
</html>
